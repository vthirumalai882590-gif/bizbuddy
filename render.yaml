services:
  - type: web
    name: bizbuddy-backend
    runtime: node
    repo: https://github.com/vthirumalai882590-gif/bizbuddy
    branch: main
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    envVars:
      - key: PORT
        value: 5001
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3.1-flash-lite
